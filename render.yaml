services:
  - type: web
    name: agentprobe-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt || pip install -r requirements.txt
    startCommand: uvicorn main:app --app-dir backend --host 0.0.0.0 --port $PORT || uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: BASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./agentprobe.db
      - key: GITHUB_PAGES_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
