services:
  - type: web
    name: agentprobe-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./agentprobe.db
      - key: GITHUB_PAGES_URL
        sync: false

  - type: static
    name: agentprobe-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishDir: dist
    envVars:
      - key: VITE_API_URL
        sync: false
